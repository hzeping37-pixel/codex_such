<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex - AI代码助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Dark Theme */
        [data-theme="dark"] {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        /* Light Theme */
        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #eaeef2;
            --border: #d0d7de;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --accent: #0969da;
            --accent-green: #1a7f37;
            --accent-red: #cf222e;
            --accent-yellow: #9a6700;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }
        
        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #58a6ff 0%, #a371f7 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-left: 30px;
        }
        
        .nav-tab {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .nav-tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-tab.active { background: var(--accent); color: white; }
        
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /* Theme Toggle */
        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        
        .theme-toggle:hover { background: var(--border); }
        
        .theme-icon { font-size: 16px; }
        
        /* Settings Button */
        .settings-btn {
            background: var(--bg-tertiary);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .settings-btn:hover { background: var(--border); color: var(--text-primary); }
        
        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 60px;
            right: 20px;
            width: 320px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 20px;
            display: none;
            z-index: 1000;
        }
        
        .settings-panel.show { display: block; }
        
        .settings-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .setting-item:last-child { border-bottom: none; }
        
        .setting-label {
            font-size: 14px;
            color: var(--text-primary);
        }
        
        .setting-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* Toggle Switch */
        .toggle {
            position: relative;
            width: 48px;
            height: 26px;
        }
        
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-tertiary);
            border-radius: 26px;
            transition: 0.3s;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        
        .toggle input:checked + .toggle-slider {
            background: var(--accent);
        }
        
        .toggle input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }
        
        /* Select */
        .setting-select {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
        }
        
        /* Main Layout */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .file-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        
        .file-item:hover { background: var(--bg-tertiary); }
        .file-icon { opacity: 0.6; }
        
        /* Chat Panel */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-user {
            display: flex;
            justify-content: flex-end;
        }
        
        .message-user .bubble {
            background: var(--accent);
            color: white;
            border-radius: 18px 18px 4px 18px;
            max-width: 80%;
            padding: 12px 18px;
        }
        
        .message-ai {
            display: flex;
            gap: 12px;
        }
        
        .ai-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #58a6ff 0%, #a371f7 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: bold;
            font-size: 14px;
            color: white;
        }
        
        .message-ai .bubble {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px 18px 18px 18px;
            max-width: 85%;
            padding: 16px 20px;
        }
        
        .code-block {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 12px 0;
            overflow: hidden;
        }
        
        .code-header {
            background: var(--bg-tertiary);
            padding: 8px 14px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        
        .copy-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        
        .code-content {
            padding: 16px;
            overflow-x: auto;
            font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
        }
        
        .explanation {
            background: rgba(88, 166, 255, 0.1);
            border-left: 3px solid var(--accent);
            padding: 14px 18px;
            border-radius: 0 8px 8px 0;
            margin: 12px 0;
            font-size: 14px;
            line-height: 1.7;
        }
        
        .error-info {
            background: rgba(248, 81, 73, 0.1);
            border-left: 3px solid var(--accent-red);
            padding: 14px 18px;
            border-radius: 0 8px 8px 0;
            margin: 12px 0;
            font-size: 13px;
        }
        
        .files-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        
        .file-tag {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Input Area */
        .input-area {
            padding: 20px 0;
            border-top: 1px solid var(--border);
        }
        
        .input-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .input-wrapper:focus-within { 
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }
        
        .input-content {
            display: flex;
            gap: 10px;
            padding: 12px;
        }
        
        .input-content textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            min-height: 24px;
            max-height: 150px;
        }
        
        .input-content textarea::placeholder { color: var(--text-secondary); }
        
        .send-btn {
            background: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .send-btn svg { width: 18px; height: 18px; fill: white; }
        
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 10px 0;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Welcome */
        .welcome {
            text-align: center;
            padding: 60px 20px;
        }
        
        .welcome h2 {
            font-size: 32px;
            margin-bottom: 12px;
        }
        
        .welcome p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .quick-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .quick-btn:hover { border-color: var(--accent); background: var(--bg-tertiary); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">C</div>
            <span>Codex</span>
        </div>
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('chat')">对话</div>
            <div class="nav-tab" onclick="clearHistory()">清空历史</div>
        </div>
        <div class="header-right">
            <div class="theme-toggle" onclick="toggleTheme()">
                <span class="theme-icon" id="themeIcon">🌙</span>
                <span id="themeText">黑夜模式</span>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
        </div>
    </div>
    
    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">设置</div>
        
        <div class="setting-item">
            <div>
                <div class="setting-label">主题模式</div>
                <div class="setting-desc">切换白天/黑夜模式</div>
            </div>
            <div class="theme-toggle" onclick="toggleTheme()">
                <span class="theme-icon" id="themeIcon2">🌙</span>
            </div>
        </div>
        
        <div class="setting-item">
            <div>
                <div class="setting-label">字体大小</div>
                <div class="setting-desc">调整界面字体大小</div>
            </div>
            <select class="setting-select" id="fontSize" onchange="changeFontSize(this.value)">
                <option value="13">小</option>
                <option value="14" selected>中</option>
                <option value="16">大</option>
            </select>
        </div>
        
        <div class="setting-item">
            <div>
                <div class="setting-label">代码高亮</div>
                <div class="setting-desc">开启代码语法高亮</div>
            </div>
            <label class="toggle">
                <input type="checkbox" id="codeHighlight" checked onchange="toggleCodeHighlight(this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
        
        <div class="setting-item">
            <div>
                <div class="setting-label">发送方式</div>
                <div class="setting-desc">Enter键发送消息</div>
            </div>
            <label class="toggle">
                <input type="checkbox" id="enterToSend" checked onchange="toggleEnterToSend(this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>
    
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>工作区文件</span>
                <span id="fileCount">0 个文件</span>
            </div>
            <div class="file-tree" id="fileTree">
                <div style="padding: 20px; color: var(--text-secondary); font-size: 13px;">
                    暂无文件<br>生成代码后将显示在这里
                </div>
            </div>
        </div>
        
        <div class="chat-panel">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome" id="welcome">
                    <h2>⚡ Codex</h2>
                    <p>AI驱动的代码生成与项目构建助手</p>
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="setExample('你好，介绍一下你自己')">👋 打个招呼</button>
                        <button class="quick-btn" onclick="setExample('Python和Java哪个更适合初学者？')">🤔 编程问答</button>
                        <button class="quick-btn" onclick="setExample('解释一下什么是面向对象编程')">📖 概念解释</button>
                        <button class="quick-btn" onclick="setExample('写一个函数计算斐波那契数列')">⚡ 生成代码</button>
                        <button class="quick-btn" onclick="setExample('生成一个Flask REST API项目')">📦 生成项目</button>
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-content">
                        <textarea id="userInput" placeholder="输入你的问题，我会自动识别你想做什么..." rows="1" onkeydown="handleKeydown(event)"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');
        const fileTree = document.getElementById('fileTree');
        const settingsPanel = document.getElementById('settingsPanel');
        
        // Load settings from localStorage
        let settings = JSON.parse(localStorage.getItem('codex_settings') || '{}');
        if (settings.theme) applyTheme(settings.theme);
        if (settings.fontSize) document.getElementById('fontSize').value = settings.fontSize;
        if (settings.codeHighlight !== undefined) document.getElementById('codeHighlight').checked = settings.codeHighlight;
        if (settings.enterToSend !== undefined) document.getElementById('enterToSend').checked = settings.enterToSend;
        
        function saveSettings() {
            localStorage.setItem('codex_settings', JSON.stringify(settings));
        }
        
        // Theme
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const isDark = theme === 'dark';
            document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
            document.getElementById('themeText').textContent = isDark ? '黑夜模式' : '白天模式';
            document.getElementById('themeIcon2').textContent = isDark ? '🌙' : '☀️';
            settings.theme = theme;
            saveSettings();
        }
        
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }
        
        // Settings
        function toggleSettings() {
            settingsPanel.classList.toggle('show');
        }
        
        document.addEventListener('click', (e) => {
            if (!settingsPanel.contains(e.target) && !e.target.closest('.settings-btn')) {
                settingsPanel.classList.remove('show');
            }
        });
        
        function changeFontSize(size) {
            document.documentElement.style.fontSize = size + 'px';
            settings.fontSize = size;
            saveSettings();
        }
        
        function toggleCodeHighlight(enabled) {
            settings.codeHighlight = enabled;
            saveSettings();
        }
        
        function toggleEnterToSend(enabled) {
            settings.enterToSend = enabled;
            saveSettings();
        }
        
        // Input
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
        
        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey && settings.enterToSend !== false) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function setExample(text) {
            userInput.value = text;
            userInput.focus();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function addMessage(type, content) {
            if (welcome) welcome.style.display = 'none';
            const msg = document.createElement('div');
            msg.className = `message message-${type}`;
            msg.innerHTML = content;
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msg;
        }
        
        function addTypingIndicator() {
            return addMessage('ai', `
                <div class="ai-avatar">C</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `);
        }
        
        function copyCode(btn, codeId) {
            const code = document.getElementById(codeId).textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = '已复制';
                setTimeout(() => btn.textContent = '复制', 1500);
            });
        }
        
        async function refreshFiles() {
            try {
                const res = await fetch('/api/files');
                const data = await res.json();
                if (data.files && data.files.length > 0) {
                    document.getElementById('fileCount').textContent = data.files.length + ' 个文件';
                    fileTree.innerHTML = data.files.map(f => `
                        <div class="file-item" onclick="viewFile('${f}')">
                            <span class="file-icon">📄</span>
                            <span>${f}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }
        
        async function viewFile(path) {
            try {
                const res = await fetch(`/api/files/${path}`);
                const data = await res.json();
                const fileId = 'view-' + Date.now();
                addMessage('ai', `
                    <div class="ai-avatar">C</div>
                    <div class="bubble">
                        <div style="font-size: 13px; color: var(--accent); margin-bottom: 10px;">📄 ${path}</div>
                        <div class="code-block">
                            <div class="code-header">
                                <span>${path.split('.').pop()}</span>
                                <button class="copy-btn" onclick="copyCode(this, '${fileId}')">复制</button>
                            </div>
                            <pre class="code-content" id="${fileId}">${escapeHtml(data.content)}</pre>
                        </div>
                    </div>
                `);
            } catch (e) {
                alert('文件读取失败');
            }
        }
        
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            addMessage('user', `<div class="bubble">${escapeHtml(text)}</div>`);
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            
            const typing = addTypingIndicator();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_type: 'chat', prompt: text, language: 'python' })
                });
                
                const result = await response.json();
                typing.remove();
                
                const statusClass = result.status === 'success' ? 'status-success' : 'status-failed';
                const statusText = result.status === 'success' ? '✓ 成功' : '✗ 失败';
                
                const taskLabels = {
                    'chat': '💬 对话', 'generate': '⚡ 代码生成', 'explain': '📖 代码解释',
                    'refactor': '🔄 代码重构', 'debug': '🐛 调试', 'project': '📦 项目生成'
                };
                const taskLabel = taskLabels[result.task_type] || '💬 对话';
                
                let html = `<div class="ai-avatar">C</div><div class="bubble">`;
                
                if (result.explanation) {
                    html += `<div style="line-height: 1.7;">${escapeHtml(result.explanation)}</div>`;
                }
                
                if (result.code) {
                    const codeId = 'code-' + Date.now();
                    html += `
                        <div class="code-block">
                            <div class="code-header">
                                <span>Python</span>
                                <button class="copy-btn" onclick="copyCode(this, '${codeId}')">复制</button>
                            </div>
                            <pre class="code-content" id="${codeId}">${escapeHtml(result.code)}</pre>
                        </div>
                    `;
                }
                
                if (result.file_contents) {
                    result.file_contents.forEach((file, idx) => {
                        const fid = 'file-' + Date.now() + '-' + idx;
                        html += `
                            <div style="margin-top: 12px;">
                                <div style="font-size: 13px; color: var(--accent); margin-bottom: 6px;">📄 ${file.path}</div>
                                <div class="code-block">
                                    <div class="code-header">
                                        <span>${file.path.split('.').pop()}</span>
                                        <button class="copy-btn" onclick="copyCode(this, '${fid}')">复制</button>
                                    </div>
                                    <pre class="code-content" id="${fid}">${escapeHtml(file.content)}</pre>
                                </div>
                            </div>
                        `;
                    });
                }
                
                if (result.saved_file) {
                    html += `<div style="margin-top: 10px; font-size: 13px; color: var(--accent-green);">✓ 已保存到: ${result.saved_file}</div>`;
                }
                
                if (result.files && result.files.length > 0) {
                    html += `<div style="margin-top: 10px; font-size: 13px; color: var(--accent-green);">✓ 已生成 ${result.files.length} 个文件</div>`;
                    refreshFiles();
                }
                
                if (result.error) {
                    html += `<div class="error-info">${escapeHtml(result.error)}</div>`;
                }
                
                html += `<div style="margin-top: 10px; font-size: 12px; color: var(--text-secondary);">
                    <span style="background: var(--bg-tertiary); padding: 2px 8px; border-radius: 4px; margin-right: 6px;">${taskLabel}</span>
                    <span class="status-badge" style="background: ${result.status === 'success' ? 'var(--accent-green)' : 'var(--accent-red)'}; color: white; padding: 2px 8px; border-radius: 4px;">${statusText}</span>
                </div>`;
                
                html += `</div>`;
                addMessage('ai', html);
                
            } catch (error) {
                typing.remove();
                addMessage('ai', `
                    <div class="ai-avatar">C</div>
                    <div class="bubble">
                        <div class="error-info">
                            <strong>请求失败</strong><br>${escapeHtml(error.message)}<br><br>
                            请确保后端服务已启动：<code>python main.py</code>
                        </div>
                    </div>
                `);
            }
            
            sendBtn.disabled = false;
            userInput.focus();
        }
        
        async function clearHistory() {
            if (confirm('确定要清空所有对话历史吗？')) {
                try {
                    await fetch('/api/history', { method: 'DELETE' });
                    chatMessages.innerHTML = '';
                    if (welcome) {
                        chatMessages.appendChild(welcome);
                        welcome.style.display = 'block';
                    }
                } catch (e) {
                    alert('清空失败');
                }
            }
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        // Load history on page load
        window.onload = async function() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                if (data.history && data.history.length > 0) {
                    if (welcome) welcome.style.display = 'none';
                    data.history.forEach(record => {
                        addHistoryMessage(record);
                    });
                }
            } catch (e) {}
            refreshFiles();
        };
        
        function addHistoryMessage(record) {
            addMessage('user', `<div class="bubble">${escapeHtml(record.user)}</div>`);
            
            const taskLabels = {
                'chat': '💬 对话', 'generate': '⚡ 代码生成', 'explain': '📖 代码解释',
                'refactor': '🔄 代码重构', 'debug': '🐛 调试', 'project': '📦 项目生成'
            };
            const taskLabel = taskLabels[record.task_type] || '💬 对话';
            
            let html = `<div class="ai-avatar">C</div><div class="bubble">`;
            
            if (record.ai) {
                html += `<div style="line-height: 1.7;">${escapeHtml(record.ai)}</div>`;
            }
            
            if (record.code) {
                const codeId = 'hist-' + record.id;
                html += `
                    <div class="code-block">
                        <div class="code-header">
                            <span>Python</span>
                            <button class="copy-btn" onclick="copyCode(this, '${codeId}')">复制</button>
                        </div>
                        <pre class="code-content" id="${codeId}">${escapeHtml(record.code)}</pre>
                    </div>
                `;
            }
            
            if (record.saved_file) {
                html += `<div style="margin-top: 8px; font-size: 13px; color: var(--accent-green);">✓ 已保存到: ${record.saved_file}</div>`;
            }
            
            html += `<div style="margin-top: 10px; font-size: 12px; color: var(--text-secondary);">
                <span style="background: var(--bg-tertiary); padding: 2px 8px; border-radius: 4px;">${taskLabel}</span>
            </div>`;
            
            html += `</div>`;
            addMessage('ai', html);
        }
    </script>
</body>
</html>
